# Objectives Log — Structured scientific progress tracking
# Each completed task should be logged here as an objective.
# The morning report reads this file to generate PI briefing slides.
#
# Rules:
#   - statement: ≤20 words, clear and direct
#   - Every objective MUST have at least one figure before completion
#   - metrics: extract all numbers (accuracy, loss, counts, timings)
#   - conclusions: 1-2 sentences explaining what the result means

objectives:
  - id: obj-001
    status: completed
    statement: "Multi-backend I2V architecture for cost reduction"
    methodology: >
      Created backends.py with abstract I2VBackend class and three concrete backends
      (WAN 14B, CogVideoX 5B with int8 quantization, LTX-Video 2B). Refactored
      dippy-app.py to use backend abstraction with UI dropdown and env var selection.
    metrics:
      wan14b_vram_gb: 26
      cogvideo5b_vram_gb: 5
      ltx2b_vram_gb: 8
      t4_compatible_backends: 2
      estimated_cost_reduction_factor: 10
    figures:
      - figures/backend_comparison.png
    conclusions: >
      CogVideoX-5B (int8) and LTX-Video 2B both fit on free Colab T4,
      eliminating the A100 requirement for development iteration.
      Production quality still requires WAN 14B on A100/3090.
    connects_to: obj-002
    completed_date: "2026-03-10"

  - id: obj-002
    status: completed
    statement: "CogVideoX-5B runs locally on RTX 3060 12GB with sequential CPU offload"
    methodology: >
      Created dippy conda env (torch 2.10+cu128, diffusers 0.36.0, transformers 5.1.0).
      Discovered torchao int8 + cpu_offload incompatible; used bf16 with sequential CPU offload.
      Auto-detect VRAM < 14GB triggers sequential offload in backends.py.
    metrics:
      peak_vram_gb: 4.04
      load_time_s: 5.3
      generation_time_s: 1403
      time_per_step_s: 44.5
      steps: 30
      frames: 49
      fps: 8
      clip_duration_s: 6.1
    figures:
      - results/cogvideo_rtx3060_benchmark.png
    conclusions: >
      CogVideoX-5B runs on RTX 3060 12GB at 4GB peak VRAM via sequential CPU offload.
      Generation is slow (23 min for 6s clip) due to layer-by-layer CPU-GPU transfers,
      but proves local development iteration is possible without cloud GPUs.
    connects_to: obj-003
    completed_date: "2026-03-11"

  - id: obj-003
    status: completed
    statement: "CogVideoX step reduction: 10 steps is 4x faster with comparable quality"
    methodology: >
      Ran CogVideoX-5B on RTX 3060 with sequential CPU offload at 30, 15, and 10 steps.
      Compared generation time, VRAM usage, and visual output quality on same input/seed.
    metrics:
      steps_30_time_min: 23.4
      steps_15_time_min: 9.1
      steps_10_time_min: 6.0
      peak_vram_gb: 4.04
      speedup_15_vs_30: 2.6
      speedup_10_vs_30: 3.9
    figures:
      - results/cogvideo_step_reduction.png
    conclusions: >
      10 steps produces visually comparable output to 30 steps on CogVideoX-5B,
      reducing local generation from 23 min to 6 min per clip. Recommended as
      default for local RTX 3060 development iteration.
    connects_to: obj-004
    completed_date: "2026-03-12"

  - id: obj-004
    status: completed
    statement: "LTX-Video 2B runs locally but produces minimal motion vs CogVideoX"
    methodology: >
      Added sequential CPU offload to LTX backend (same pattern as CogVideoX).
      Ran both backends on RTX 3060 with same stick figure input and wave prompt.
      Compared output quality, VRAM, and generation time.
    metrics:
      ltx_peak_vram_gb: 0.97
      ltx_gen_time_s: 1244
      ltx_steps: 20
      ltx_frames: 25
      ltx_fps: 24
      cogvideo_peak_vram_gb: 4.04
      cogvideo_gen_time_s: 358
      cogvideo_steps: 10
      cogvideo_frames: 49
      cogvideo_fps: 8
    figures:
      - results/backend_comparison_local.png
    conclusions: >
      Both backends run on RTX 3060 12GB with sequential CPU offload.
      CogVideoX-5B produces much stronger motion (real hand appearing from prompt),
      while LTX-Video 2B barely animates the input. CogVideoX is the clear winner
      for local development: faster (6 vs 21 min), more frames, better quality.
    connects_to: obj-005
    completed_date: "2026-03-12"

  - id: obj-005
    status: completed
    statement: "CogVideoX-5B animates cartoon avatar with prompt-appropriate gestures"
    methodology: >
      Created a cartoon-style character image (blue shirt, drawn features).
      Tested two charades-style prompts: waving hello, pointing to self.
      Ran CogVideoX-5B at 10 steps on RTX 3060 with sequential CPU offload.
    metrics:
      wave_gen_time_s: 390.5
      point_gen_time_s: 347.7
      peak_vram_gb: 4.03
      frames_per_clip: 49
      fps: 8
      clip_duration_s: 6.1
    figures:
      - results/avatar_test_results.png
    conclusions: >
      CogVideoX-5B successfully animates a cartoon avatar with prompt-appropriate
      gestures. The wave prompt raises the right hand, the point prompt brings a
      finger forward. Character style is preserved. Validates the pipeline for
      the actual Dippy use case (charades-style language learning clips).
    connects_to: obj-006
    completed_date: "2026-03-12"

  - id: obj-006
    status: completed
    statement: "Full forward+reset looping pipeline works locally on RTX 3060"
    methodology: >
      Ran headless test of the complete Dippy pipeline: forward pass (animate sentence)
      then reset pass (return to neutral). Used cartoon avatar with "hello, nice to meet you".
      Verified loop closure: frame 96 matches frame 0.
    metrics:
      forward_time_s: 349
      reset_time_s: 348
      total_time_s: 696
      total_time_min: 11.6
      total_frames: 97
      clip_duration_s: 12.1
      peak_vram_gb: 4.03
      steps_per_pass: 10
    figures:
      - results/pipeline_test_visualization.png
    conclusions: >
      The full forward+reset pipeline runs locally in 11.6 minutes per sentence.
      Loop closes correctly (frame 96 = frame 0). Motion is primarily facial
      expression changes; arm gestures may need stronger prompting or WAN 14B.
      Pipeline mechanics validated for local CogVideoX-5B development.
    connects_to: obj-007
    completed_date: "2026-03-12"

  - id: obj-007
    status: completed
    statement: "Action-style prompts produce dramatically better arm gestures on CogVideoX"
    methodology: >
      Ran 5 prompt/guidance variants on CogVideoX-5B (RTX 3060, 10 steps, sequential offload)
      with same cartoon avatar input and seed. Compared: basic, detailed, action-style prompts
      at guidance_scale=6.0, plus detailed prompt at guidance_scale=9.0 and 12.0.
    metrics:
      variants_tested: 5
      steps: 10
      peak_vram_gb: 4.03
      basic_gesture_quality: "facial only"
      detailed_gesture_quality: "minimal motion"
      action_gesture_quality: "both arms raised overhead"
      gs9_gesture_quality: "less motion, character shrinks"
      gs12_gesture_quality: "blurry, minimal motion"
      best_variant: "action"
      best_guidance_scale: 6.0
    figures:
      - results/prompt_sweep_comparison.png
    conclusions: >
      Action-style prompts with explicit body movement descriptions ("raises both arms
      overhead and waves, big exaggerated waving motion") produce dramatically better
      arm/body gestures than basic or detailed prompts. Higher guidance scale (9.0, 12.0)
      actually reduces motion quality and adds blur. Default guidance_scale=6.0 is optimal.
    connects_to: obj-008
    completed_date: "2026-03-12"

  - id: obj-008
    status: completed
    statement: "Gradio app wired for local CogVideoX launch with action-style prompts"
    methodology: >
      Updated dippy-app.py UI to initialize from active backend's defaults (steps, guidance,
      duration). Changed CogVideoX default_steps to 10. Updated switch_backend() to adjust
      duration slider range. Validated full forward+reset pipeline with new action-style prompts.
    metrics:
      forward_time_s: 348
      reset_time_s: 353
      total_time_s: 702
      total_time_min: 11.7
      peak_vram_gb: 4.03
      gesture_quality: "arms raised, waving, full-body motion"
      frames: 97
      fps: 8
    figures:
      - results/pipeline_prompt_upgrade.png
    conclusions: >
      Gradio app now launches locally with correct CogVideoX-5B defaults (10 steps, gs=6.0,
      6.1s fixed duration). Action-style prompts produce dramatic arm/body gestures in the
      full pipeline. Performance matches prior benchmarks (11.7 min, 4.03GB VRAM).
    connects_to: obj-009
    completed_date: "2026-03-12"

  - id: obj-009
    status: completed
    statement: "RunPod/Vast.ai one-command deploy script for all three backends"
    methodology: >
      Created deploy_runpod.sh with backend selection, dependency installation, HF cache
      setup, model pre-download, VRAM validation, and Gradio launch with share link.
      Supports wan14b (RTX 3090), cogvideo5b (any GPU), and ltx2b.
    metrics:
      backends_supported: 3
      runpod_3090_cost_per_hr: 0.22
      wan14b_vram_gb: 26
      cogvideo5b_vram_gb: 5
      deployment_targets: 4
    figures:
      - figures/deployment_options.png
    conclusions: >
      All four deployment targets now have ready-to-use launch mechanisms:
      local (verified), Colab (notebook), RunPod/Vast.ai (deploy script), PACE (SLURM).
      Remaining work is user testing on actual cloud instances.
    connects_to: obj-010
    completed_date: "2026-03-12"

  - id: obj-010
    status: completed
    statement: "FastAPI REST endpoint for alinakai sentence-to-clip integration"
    methodology: >
      Created api.py with FastAPI server wrapping the existing backend abstraction.
      POST /generate accepts sentence + avatar image (base64 or URL), runs forward+reset
      pipeline, returns clip URLs. GET /clips/{id}/{file} serves generated MP4s.
      GET /backends lists available backends. Reuses prompt templates from dippy-app.py.
    metrics:
      endpoints: 4
      request_fields: 10
      response_fields: 7
      backends_supported: 3
      output_formats: 3
    figures:
      - figures/api_architecture.png
    conclusions: >
      The REST API provides programmatic access to the Dippy pipeline for alinakai
      integration. Accepts JSON with sentence + avatar, returns clip URLs.
      Runs on any GPU-equipped server (RunPod, PACE, local). Next step is
      async job queue for production use.
    connects_to: obj-011
    completed_date: "2026-03-14"

  - id: obj-011
    status: completed
    statement: "WAN 14B forward+reset inference validated on PACE A100"
    methodology: >
      Created pace_inference.sbatch and pace_test_inference.py for headless inference.
      Iterated through 6 job submissions fixing: missing venv, CUBLAS LoRA bf16 error
      (fuse on CPU), CUBLAS text encoder error (PyTorch 2.10 bug → downgrade to 2.6),
      OOM kill (64G→128G RAM), disk quota (cleared pip cache).
    metrics:
      jobs_submitted: 6
      successful_job: 4934779
      forward_time_s: 313.1
      reset_time_s: 279.2
      total_inference_s: 592.3
      total_inference_min: 9.9
      model_load_time_s: 1270.5
      peak_vram_gb: 53.13
      model_vram_gb: 46.12
      total_frames: 97
      fps: 8
      pytorch_version: "2.6.0+cu124"
      a100_model: "NVIDIA A100 80GB PCIe"
      ram_used_gb: 67.2
    figures:
      - figures/pace_wan14b_results.png
      - figures/pace_migration_timeline.png
    conclusions: >
      WAN 14B runs successfully on PACE A100 with PyTorch 2.6+cu124. Full forward+reset
      loop completes in ~10 min (vs 11.6 min for CogVideoX on local RTX 3060). Peak VRAM
      53GB, needs 128G RAM for CPU loading. PyTorch 2.10 has CUBLAS bugs on A100 — must
      use 2.6. Pipeline is production-ready for PACE cluster inference.
    connects_to: obj-012
    completed_date: "2026-03-14"

  - id: obj-012
    status: completed
    statement: "CogVideoX requires Ampere+ GPUs — RTX 6000 (Turing) fails"
    methodology: >
      Tested CogVideoX-5B on PACE RTX 6000 (24GB, Turing/SM 7.5) across 5 job
      iterations: bf16 with sequential offload, int8 with model offload, attention
      slicing, torchao 0.8/0.16. All fail with 113GB OOM in F.scaled_dot_product_attention
      because Turing lacks Flash Attention (requires SM 8.0+).
    metrics:
      jobs_tested: 5
      attention_alloc_gb: 113
      rtx6000_vram_gb: 23.5
      rtx6000_arch: "Turing SM 7.5"
      flash_attention_supported: false
      min_arch_required: "Ampere SM 8.0+"
      runpod_3090_cost_per_hr: 0.22
      runpod_a100_cost_per_hr: 1.50
    figures:
      - figures/gpu_compatibility.png
    conclusions: >
      CogVideoX-5B fundamentally requires Ampere+ GPUs for Flash Attention. Without it,
      SDPA materializes the full 113GB attention matrix. For RunPod, RTX 3090 (Ampere,
      24GB, $0.22/hr) is the economical choice. Avoid Turing GPUs (RTX 6000, V100).
    connects_to: obj-013
    completed_date: "2026-03-14"

  - id: obj-013
    status: completed
    statement: "5-sentence chained charades demo video generated on PACE A100"
    methodology: >
      Created pace_demo_trajectory.py to generate multi-sentence chained demos.
      Ran 5 PI-specified sentences (He jumped, She laughed, She laughed at him,
      He ran, He ran because it started raining) on PACE A100 with WAN 14B.
      Each sentence: forward pass (act out) + reset pass (return to neutral).
    metrics:
      sentences: 5
      total_frames: 481
      duration_s: 20.0
      fps: 24
      inference_time_min: 46.0
      model_load_time_s: 1272.9
      walltime_min: 69
      per_sentence_time_s: 551
      peak_vram_gb: 53.13
      video_size_mb: 14.6
    figures:
      - figures/demo_trajectory_keyframes.png
      - results/demo_trajectory_wan14b.mp4
    conclusions: >
      Full 5-sentence chained demo works end-to-end on PACE A100. Each sentence
      takes ~9 min (forward+reset). Total 20s video at 24fps. Pipeline chains
      clips seamlessly with forced boundary frames. Next: real avatar image,
      video caching system, and quality evaluation of gesture accuracy.
    connects_to: obj-014
    completed_date: "2026-03-15"

  - id: obj-014
    status: in-progress
    statement: "Test AI-generated avatars (ChatGPT, Gemini, Perplexity) with WAN and LTX backends"
    methodology: >
      Created pace_avatar_test.py — backend-agnostic script that runs forward+reset
      for each avatar on "He jumped". SLURM scripts for WAN 14B (A100, 128G RAM)
      and LTX-Video 2B (A100, 64G RAM). Three avatars: ChatGPT (sleek robot),
      Gemini (translucent blob), Perplexity (egg-shaped bot with detached limbs).
      Blocked on VPN — GlobalProtect disconnected, cannot SSH to PACE.
    metrics:
      avatars_tested: 3
      backends_planned: 2
      scripts_created: 3
      commit: "7803185"
    figures: []
    conclusions: >
      Pipeline code complete. Awaiting VPN connectivity to submit PACE jobs.
      Expected ~30 min for WAN (3 avatars), ~15 min for LTX (3 avatars).
    connects_to: null
    completed_date: null

  - id: obj-015
    status: completed
    statement: "Video clip caching system for instant replay of repeated sentences"
    methodology: >
      Built clip_cache.py with ClipCache class that stores forward+reset clips
      keyed by (normalized_sentence, backend, avatar_hash). Integrated into
      dippy-app.py generate_trajectory() — on cache hit, frames load from disk
      with zero inference cost. Normalized matching ensures "He jumped" and
      "he jumped" resolve to the same entry. Unit tests pass (CPU-only).
      Simulated saturation with Zipf distribution over 50-word vocab.
    metrics:
      cache_key_components: 3
      normalization: "lowercase, strip, collapse whitespace"
      avatar_hash_method: "sha256 of 64x64 thumbnail pixels"
      files_per_entry: 3
      unit_tests_passed: true
      simulated_hit_rate_at_200_requests: 86.5
      simulated_gpu_hours_saved: 26.4
      simulated_gpu_hours_used: 4.1
    figures:
      - figures/cache_saturation_analysis.png
    conclusions: >
      The caching layer implements the PI's "saturation strategy." Simulation
      shows 86.5% hit rate after 200 requests over a 50-word vocab (Zipf
      distribution), saving 26.4 GPU-hours vs 4.1 used. Next: integrate
      into api.py for production use.
    connects_to: null
    completed_date: "2026-03-16"

