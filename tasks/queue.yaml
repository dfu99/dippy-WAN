- objective: Do you remember the objective of dippy-WAN? It is to create a sort of
    virtual, on-screen assistant, reminiscent of clippy. But dippy's purpose is to
    provide visual, action context for people learning languages, like charades. So
    if the sentence (in another language) is something like He jumped, then dippy
    renders a short video of jumping. It has to do a forward and backward pass because
    it has to be able to return to the same idle state. If the next sentence is He
    walked, then after returning to that idle state, it is able to play the walking
    video in a chain. So to the user, dippy appears smooth, but in reality, it is
    simply chaining together videos. Moreover, to smooth things out, we will save
    and cache every generated video. Eventually, as users saturate the different meanings,
    the videos will become more and more and rarely will we actually need to generate
    a new video from scratch rather than simply finding and loading a cached video.
    You have to be able to create a video demo that shows dippy is seamless through
    multiple different charades scenes, like He jumped, She laughed, She laughed at
    him, He ran, He ran because it started raining.
  priority: 3
  status: completed
