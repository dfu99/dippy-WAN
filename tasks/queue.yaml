- objective: 'Good job on the WAN pipeline. Now, we''re going to start thinking about
    engineering production-scale performance and integration with our whole system.
    Our system is like this: a user is learning a language. this avatar and its animations
    are visual, charades-like hints. a trajectory of sentences is generated by an
    LLM that has knowledge of the user''s current proficiency. that trajectory (of
    perhaps 10 sentences) is pre-generated and cached. dippy-WAN will have access
    to that cached sentence trajectory. the LLM will actually generate multiple trajectories.
    dippy-WAN then needs to check its database of cached video segments, and check
    if there is a trajectory where it has all the videos already in memory needed
    to stitch together a continuous animation that aligns with the trajectory. it
    should do so by calculating a confidence score, which is the aggregate cosine
    similarity alignment of the trajectory of sentences to a constructed trajectory
    of prompts. basically, it takes in a sequence of sentences as input, then does
    a sequence to sequence (transformer architecture) mapping to video segments. if
    alignment is poor, find the worst aligned video, and flag it for regeneration.
    if a trajectory involves regeneration, then it must be weigh the misalignment
    to the time expected to regenerate. then, the user''s proficiency is used to estimate
    a Time Till Regenerated Scene metric. it is bad if a user is expected to reach
    the regenerating segment way earlier than it would take for the scene to be regenerated.
    the regenerated video is added to the database with metadata about its prompt.
    early on, a higher latency for generation or lower alignment may be acceptable,
    since the video segment cache will not be very large. pretty much, we do live
    video generation with caching and forecast what will provide users with the smoothest
    experience.'
  priority: 3
  status: completed
  added: 2026-03-22 16:13
  source: slack
